name: Dependabot Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v3
        with:
          alert-lookup: true
          compat-lookup: true
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Dependabot auto-merge (Patch)
        if: steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          echo "🔧 A patch update has been detected; it is being merged automatically..."
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Automatically merge minor updates
        if: steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          echo "📦 A minor update has been detected; an automatic merge is in progress..."
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add tags to major updates
        if: steps.dependabot-metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "🚨 Major update — manual review required"
          gh label create "major-update" --color "d93f0b" --description "Major version update" || true
          gh label create "needs-review" --color "fbca04" --description "Needs manual review" || true
          gh pr edit "$PR_URL" --add-label "major-update,needs-review"
          gh pr comment "$PR_URL" \
            --body "⚠️ **Major update** — this PR will not be merged automatically. Manual review is required."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
