services:
  # --- BACKEND (Node.js/Express) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - rabbitmq
    networks:
      - app_network

  # --- MESSAGE BROKER (RabbitMQ) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: nexthire
      RABBITMQ_DEFAULT_PASS: nexthire
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- WORKER (Node.js RabbitMQ Consumer) ---
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: worker
    command: npx ts-node src/queues/index.ts
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - app_network

  # --- AI SERVICE (PYTHON) ---
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
    container_name: ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service:/usr/src/app
    ports:
      - "8000:8000"
    networks:
      - app_network

  # --- WORKER (PYTHON RabbitMQ Consumer for AI) ---
  ai-worker:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
    container_name: ai-worker
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    command: python -m app.workers.llm_consumer
    networks:
      - app_network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  rabbitmq_data:

networks:
  app_network:
    driver: bridge
