services:
  # --- BACKEND (Node.js/Express) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - rabbitmq
    networks:
      - app_network

  # --- MESSAGE BROKER (RabbitMQ) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: nexthire
      RABBITMQ_DEFAULT_PASS: nexthire
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    networks:
      - app_network

  # --- WORKER (RabbitMQ Consumer) ---
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: worker
    command: npx ts-node src/queues/index.ts
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - rabbitmq
      - backend
    networks:
      - app_network

  # --- AI SERVICE (PYTHON) ---
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
    container_name: ai-service
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service:/usr/src/app
    ports:
      - "8000:8000"
    networks:
      - app_network

volumes:
  rabbitmq_data:

networks:
  app_network:
    driver: bridge
